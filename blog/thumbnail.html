<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1">
<title>Thumbnail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  body {
    width: 1200px;
    height: 630px;
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(135deg, #FDF6EE 0%, #F5E6D3 50%, #E8D5C0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .container {
    text-align: center;
    z-index: 2;
    padding: 40px;
  }
  .badge {
    display: inline-block;
    background: rgba(180, 120, 60, 0.15);
    color: #8B5E34;
    font-size: 16px;
    font-weight: 700;
    padding: 8px 24px;
    border-radius: 50px;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  h1 {
    font-size: 56px;
    font-weight: 900;
    color: #2D1B0E;
    line-height: 1.3;
    margin-bottom: 20px;
  }
  h1 span {
    color: #B4783C;
  }
  .subtitle {
    font-size: 22px;
    color: #6B5744;
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .tech-tags {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .tech-tag {
    background: white;
    color: #5C4A38;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .coffee-icon {
    position: absolute;
    top: 40px;
    left: 50px;
    font-size: 48px;
    opacity: 0.15;
  }
  .sparkle {
    position: absolute;
    bottom: 50px;
    right: 60px;
    font-size: 40px;
    opacity: 0.2;
  }
  .circle-deco {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(180, 120, 60, 0.06);
  }
  .circle-1 { top: -100px; right: -80px; }
  .circle-2 { bottom: -120px; left: -60px; width: 250px; height: 250px; }
  .company {
    position: absolute;
    bottom: 30px;
    right: 50px;
    font-size: 14px;
    color: #9A8672;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="circle-deco circle-1"></div>
  <div class="circle-deco circle-2"></div>
  <div class="coffee-icon">&#9749;</div>
  <div class="sparkle">&#10024;</div>
  <div class="container">
    <div class="badge">開発実績 / MVP</div>
    <h1>カフェ向け<br><span>SNS投稿AI</span>アプリ</h1>
    <p class="subtitle">AIが投稿文・レビュー返信・多言語翻訳を自動生成<br>小規模カフェのSNS運用をまるごとサポート</p>
    <div class="tech-tags">
      <span class="tech-tag">Next.js</span>
      <span class="tech-tag">Supabase</span>
      <span class="tech-tag">Claude AI</span>
      <span class="tech-tag">Vercel</span>
    </div>
  </div>
  <div class="company"><!-- 会社名をここに --></div>
</body>
</html>
